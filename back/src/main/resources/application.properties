spring.application.name=back

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=s

# Default profile is "dev" so the existing workflow (H2 in-memory + auto schema) keeps working locally.
# In production, override with --spring.profiles.active=prod (or env var SPRING_PROFILES_ACTIVE=prod)
# and define a separate application-prod.properties (ddl-auto=none, real DB, etc.).
spring.profiles.active=dev

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
