# Dev-only profile — activated by default in application.properties.
# For production, run with: --spring.profiles.active=prod
# and ensure application-prod.properties defines the right settings.

# JPA: recreate schema on every boot (dev convenience)
spring.jpa.hibernate.ddl-auto=create-drop

# JPA: log SQL statements (dev debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hibernate: trace parameter binding (very verbose — dev only)
logging.level.org.hibernate.orm.jdbc.bind=TRACE
